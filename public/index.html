<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Todo list</title>
  <style>
    :root {
      color-scheme: light dark;
      --bg: #f6f7f9;
      --fg: #1a1d23;
      --muted: #5c6573;
      --accent: #2563eb;
      --danger: #b91c1c;
      --border: #d1d5db;
      --done: #9ca3af;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #121418;
        --fg: #e8eaef;
        --muted: #9ca3af;
        --accent: #60a5fa;
        --danger: #f87171;
        --border: #374151;
        --done: #6b7280;
      }
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      background: var(--bg);
      color: var(--fg);
      line-height: 1.45;
    }
    main {
      max-width: 36rem;
      margin: 0 auto;
      padding: 2rem 1.25rem 3rem;
    }
    h1 {
      font-size: 1.5rem;
      font-weight: 650;
      margin: 0 0 1.25rem;
      letter-spacing: -0.02em;
    }
    .composer {
      display: flex;
      gap: 0.5rem;
      flex-wrap: wrap;
      align-items: flex-end;
      margin-bottom: 1.25rem;
    }
    .field {
      flex: 1 1 12rem;
      display: flex;
      flex-direction: column;
      gap: 0.35rem;
    }
    label {
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--muted);
    }
    input[type="text"] {
      width: 100%;
      padding: 0.55rem 0.65rem;
      border: 1px solid var(--border);
      border-radius: 0.375rem;
      background: transparent;
      color: inherit;
      font-size: 1rem;
    }
    input[type="text"]:focus {
      outline: 2px solid var(--accent);
      outline-offset: 1px;
    }
    button {
      font: inherit;
      cursor: pointer;
      border-radius: 0.375rem;
      border: 1px solid transparent;
      padding: 0.55rem 0.9rem;
      font-weight: 600;
    }
    button:focus-visible {
      outline: 2px solid var(--accent);
      outline-offset: 2px;
    }
    button:disabled {
      opacity: 0.55;
      cursor: not-allowed;
    }
    .add-btn {
      background: var(--accent);
      color: #fff;
      margin-top: 1.35rem;
    }
    .add-btn:hover:not(:disabled) { filter: brightness(1.05); }
    .list-wrap {
      border: 1px solid var(--border);
      border-radius: 0.5rem;
      overflow: hidden;
      background: color-mix(in srgb, var(--bg) 88%, var(--fg));
    }
    .empty {
      padding: 1.25rem;
      text-align: center;
      color: var(--muted);
      font-size: 0.95rem;
    }
    .err {
      padding: 0.75rem 1rem;
      background: color-mix(in srgb, var(--danger) 14%, transparent);
      color: var(--danger);
      font-size: 0.9rem;
    }
    ul {
      list-style: none;
      margin: 0;
      padding: 0;
    }
    li {
      display: grid;
      grid-template-columns: auto 1fr auto;
      gap: 0.65rem;
      align-items: center;
      padding: 0.65rem 0.75rem;
      border-top: 1px solid var(--border);
    }
    li:first-child { border-top: none; }
    li span.text {
      word-break: break-word;
    }
    li.done span.text {
      text-decoration: line-through;
      color: var(--done);
    }
    .del-btn {
      background: transparent;
      color: var(--danger);
      border-color: color-mix(in srgb, var(--danger) 35%, transparent);
      font-size: 0.85rem;
      padding: 0.35rem 0.55rem;
    }
    .del-btn:hover:not(:disabled) {
      background: color-mix(in srgb, var(--danger) 12%, transparent);
    }
  </style>
</head>
<body>
  <main>
    <h1>Todos</h1>
    <form class="composer" id="add-form" autocomplete="off">
      <div class="field">
        <label for="todo-input">New task</label>
        <input id="todo-input" name="title" type="text" maxlength="500" required />
      </div>
      <button type="submit" class="add-btn" id="add-btn">Add</button>
    </form>
    <div class="list-wrap" id="list-wrap" aria-live="polite">
      <p class="empty" id="empty-msg">Loading…</p>
      <ul id="todo-list" hidden></ul>
    </div>
  </main>
  <script>
(function () {
  var MAX_LEN = 500;

  /** @typedef {{ id: string, text: string, done: boolean }} TodoItem */

  var form = document.getElementById("add-form");
  var input = document.getElementById("todo-input");
  var listEl = document.getElementById("todo-list");
  var emptyEl = document.getElementById("empty-msg");
  var addBtn = document.getElementById("add-btn");

  /** @type {TodoItem[]} */
  var todos = [];
  /** @type {string | null} */
  var errMsg = null;

  function setBusy(b) {
    addBtn.disabled = b;
    input.disabled = b;
  }

  function showError(msg) {
    errMsg = msg;
    emptyEl.textContent = msg;
    emptyEl.hidden = false;
    listEl.hidden = true;
  }

  /** @param {Response} res */
  async function readError(res) {
    try {
      var j = await res.json();
      if (j && j.error) return String(j.error);
    } catch (_e) { /* ignore */ }
    return res.statusText || "Request failed";
  }

  async function refresh() {
    setBusy(true);
    errMsg = null;
    emptyEl.textContent = "Loading…";
    emptyEl.hidden = false;
    listEl.hidden = true;
    try {
      var res = await fetch("/api/todos");
      if (!res.ok) {
        showError(await readError(res));
        setBusy(false);
        return;
      }
      var data = await res.json();
      if (!data || !Array.isArray(data.todos)) {
        todos = [];
      } else {
        todos = data.todos.filter(function (row) {
          return row && typeof row.id === "string" && typeof row.text === "string" && typeof row.done === "boolean";
        }).map(function (row) {
          return { id: row.id, text: row.text.slice(0, MAX_LEN), done: !!row.done };
        });
      }
      render();
    } catch (e) {
      showError("Could not reach server. Is it running?");
    }
    setBusy(false);
  }

  function render() {
    if (errMsg) return;
    listEl.innerHTML = "";
    if (todos.length === 0) {
      emptyEl.textContent = "No tasks yet. Add one above.";
      emptyEl.hidden = false;
      listEl.hidden = true;
      return;
    }
    emptyEl.hidden = true;
    listEl.hidden = false;
    todos.forEach(function (todo) {
      var li = document.createElement("li");
      if (todo.done) li.className = "done";

      var cb = document.createElement("input");
      cb.type = "checkbox";
      cb.checked = todo.done;
      cb.setAttribute("aria-label", "Complete: " + todo.text);
      cb.addEventListener("change", function () {
        var next = cb.checked;
        cb.checked = todo.done;
        (async function () {
          try {
            var res = await fetch("/api/todos/" + encodeURIComponent(todo.id), {
              method: "PATCH",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({ done: next }),
            });
            if (!res.ok) throw new Error(await readError(res));
            var payload = await res.json();
            if (payload && payload.todo) {
              todo.done = !!payload.todo.done;
              cb.checked = todo.done;
              li.classList.toggle("done", todo.done);
            }
          } catch (e) {
            alert(e.message || "Update failed");
          }
        })();
      });

      var span = document.createElement("span");
      span.className = "text";
      span.textContent = todo.text;

      var del = document.createElement("button");
      del.type = "button";
      del.className = "del-btn";
      del.textContent = "Delete";
      del.setAttribute("aria-label", "Delete: " + todo.text);
      del.addEventListener("click", function () {
        (async function () {
          try {
            var res = await fetch("/api/todos/" + encodeURIComponent(todo.id), {
              method: "DELETE",
            });
            if (res.status === 204) {
              todos = todos.filter(function (t) { return t.id !== todo.id; });
              render();
            } else if (!res.ok) {
              throw new Error(await readError(res));
            }
          } catch (e) {
            alert(e.message || "Delete failed");
          }
        })();
      });

      li.appendChild(cb);
      li.appendChild(span);
      li.appendChild(del);
      listEl.appendChild(li);
    });
  }

  form.addEventListener("submit", function (e) {
    e.preventDefault();
    var text = (input.value || "").trim();
    if (!text) return;
    if (text.length > MAX_LEN) text = text.slice(0, MAX_LEN);
    (async function () {
      setBusy(true);
      try {
        var res = await fetch("/api/todos", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ text: text }),
        });
        if (!res.ok) throw new Error(await readError(res));
        var payload = await res.json();
        if (payload && payload.todo) {
          todos.push({
            id: payload.todo.id,
            text: String(payload.todo.text).slice(0, MAX_LEN),
            done: !!payload.todo.done,
          });
          input.value = "";
          render();
        }
      } catch (err) {
        alert(err.message || "Could not add task");
      }
      setBusy(false);
      input.focus();
    })();
  });

  refresh();
  input.focus();
})();
  </script>
</body>
</html>
