<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Todo list</title>
  <style>
    :root {
      color-scheme: light dark;
      --bg: #f6f7f9;
      --fg: #1a1d23;
      --muted: #5c6573;
      --accent: #2563eb;
      --danger: #b91c1c;
      --border: #d1d5db;
      --done: #9ca3af;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #121418;
        --fg: #e8eaef;
        --muted: #9ca3af;
        --accent: #60a5fa;
        --danger: #f87171;
        --border: #374151;
        --done: #6b7280;
      }
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      background: var(--bg);
      color: var(--fg);
      line-height: 1.45;
    }
    main {
      max-width: 36rem;
      margin: 0 auto;
      padding: 2rem 1.25rem 3rem;
    }
    h1 {
      font-size: 1.5rem;
      font-weight: 650;
      margin: 0 0 1.25rem;
      letter-spacing: -0.02em;
    }
    .composer {
      display: flex;
      gap: 0.5rem;
      flex-wrap: wrap;
      align-items: flex-end;
      margin-bottom: 1.25rem;
    }
    .field {
      flex: 1 1 12rem;
      display: flex;
      flex-direction: column;
      gap: 0.35rem;
    }
    label {
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--muted);
    }
    input[type="text"] {
      width: 100%;
      padding: 0.55rem 0.65rem;
      border: 1px solid var(--border);
      border-radius: 0.375rem;
      background: transparent;
      color: inherit;
      font-size: 1rem;
    }
    input[type="text"]:focus {
      outline: 2px solid var(--accent);
      outline-offset: 1px;
    }
    button {
      font: inherit;
      cursor: pointer;
      border-radius: 0.375rem;
      border: 1px solid transparent;
      padding: 0.55rem 0.9rem;
      font-weight: 600;
    }
    button:focus-visible {
      outline: 2px solid var(--accent);
      outline-offset: 2px;
    }
    .add-btn {
      background: var(--accent);
      color: #fff;
      margin-top: 1.35rem;
    }
    .add-btn:hover { filter: brightness(1.05); }
    .list-wrap {
      border: 1px solid var(--border);
      border-radius: 0.5rem;
      overflow: hidden;
      background: color-mix(in srgb, var(--bg) 88%, var(--fg));
    }
    .empty {
      padding: 1.25rem;
      text-align: center;
      color: var(--muted);
      font-size: 0.95rem;
    }
    ul {
      list-style: none;
      margin: 0;
      padding: 0;
    }
    li {
      display: grid;
      grid-template-columns: auto 1fr auto;
      gap: 0.65rem;
      align-items: center;
      padding: 0.65rem 0.75rem;
      border-top: 1px solid var(--border);
    }
    li:first-child { border-top: none; }
    li span.text {
      word-break: break-word;
    }
    li.done span.text {
      text-decoration: line-through;
      color: var(--done);
    }
    .del-btn {
      background: transparent;
      color: var(--danger);
      border-color: color-mix(in srgb, var(--danger) 35%, transparent);
      font-size: 0.85rem;
      padding: 0.35rem 0.55rem;
    }
    .del-btn:hover {
      background: color-mix(in srgb, var(--danger) 12%, transparent);
    }
    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }
  </style>
</head>
<body>
  <main aria-labelledby="main-heading">
    <h1 id="main-heading">Todos</h1>
    <form class="composer" id="add-form" autocomplete="off">
      <div class="field">
        <label for="todo-input">New task</label>
        <input id="todo-input" name="title" type="text" maxlength="500" required />
      </div>
      <button type="submit" class="add-btn" id="add-btn">Add</button>
    </form>
    <p id="app-status" class="sr-only" role="status" aria-live="polite"></p>
    <div class="list-wrap" id="list-wrap" aria-live="polite">
      <p class="empty" id="empty-msg">No tasks yet. Add one above.</p>
      <ul id="todo-list" hidden></ul>
    </div>
  </main>
  <script>
(function () {
  var STORAGE_KEY = "todos.v1";
  var MAX_LEN = 500;

  /** @typedef {{ id: string, text: string, done: boolean }} TodoItem */

  /**
   * Checkbox name/state must track whether activating it completes or reopens the task.
   * @param {TodoItem} todo
   * @returns {string}
   */
  function toggleAriaLabel(todo) {
    return (todo.done ? "Mark as not done: " : "Mark as done: ") + todo.text;
  }

  /** @returns {string} */
  function newId() {
    if (window.crypto && typeof window.crypto.randomUUID === "function") {
      return window.crypto.randomUUID();
    }
    return "t_" + Date.now().toString(36) + "_" + Math.random().toString(36).slice(2, 9);
  }

  /** @returns {TodoItem[]} */
  function loadTodos() {
    var raw = localStorage.getItem(STORAGE_KEY);
    if (raw == null || raw === "") return [];
    try {
      var data = JSON.parse(raw);
      if (!Array.isArray(data)) return [];
      return data
        .filter(function (row) {
          return row && typeof row.id === "string" && typeof row.text === "string" && typeof row.done === "boolean";
        })
        .map(function (row) {
          return { id: row.id, text: row.text.slice(0, MAX_LEN), done: !!row.done };
        });
    } catch (_e) {
      return [];
    }
  }

  /** @param {TodoItem[]} todos @returns {boolean} */
  function saveTodos(todos) {
    try {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(todos));
      return true;
    } catch (_err) {
      return false;
    }
  }

  var form = document.getElementById("add-form");
  var input = document.getElementById("todo-input");
  var listEl = document.getElementById("todo-list");
  var emptyEl = document.getElementById("empty-msg");
  var statusEl = document.getElementById("app-status");

  function reportSaveFailure() {
    if (statusEl) statusEl.textContent = "Could not save tasks. Storage may be full or disabled.";
  }

  function clearStatus() {
    if (statusEl) statusEl.textContent = "";
  }
  /** @type {TodoItem[]} */
  var todos = loadTodos();

  function render() {
    listEl.innerHTML = "";
    if (todos.length === 0) {
      emptyEl.hidden = false;
      listEl.hidden = true;
      return;
    }
    emptyEl.hidden = true;
    listEl.hidden = false;
    todos.forEach(function (todo) {
      var li = document.createElement("li");
      if (todo.done) li.className = "done";

      var cb = document.createElement("input");
      cb.type = "checkbox";
      cb.checked = todo.done;
      cb.setAttribute("aria-label", toggleAriaLabel(todo));
      cb.addEventListener("change", function () {
        var prev = todo.done;
        todo.done = cb.checked;
        if (!saveTodos(todos)) {
          todo.done = prev;
          cb.checked = prev;
          reportSaveFailure();
          return;
        }
        clearStatus();
        li.classList.toggle("done", todo.done);
        cb.setAttribute("aria-label", toggleAriaLabel(todo));
      });

      var span = document.createElement("span");
      span.className = "text";
      span.textContent = todo.text;

      var del = document.createElement("button");
      del.type = "button";
      del.className = "del-btn";
      del.textContent = "Delete";
      del.setAttribute("aria-label", "Delete: " + todo.text);
      del.addEventListener("click", function () {
        var snapshot = todos;
        todos = todos.filter(function (t) { return t.id !== todo.id; });
        if (!saveTodos(todos)) {
          todos = snapshot;
          reportSaveFailure();
          return;
        }
        clearStatus();
        render();
      });

      li.appendChild(cb);
      li.appendChild(span);
      li.appendChild(del);
      listEl.appendChild(li);
    });
  }

  form.addEventListener("submit", function (e) {
    e.preventDefault();
    var text = (input.value || "").trim();
    if (!text) return;
    if (text.length > MAX_LEN) text = text.slice(0, MAX_LEN);
    var row = { id: newId(), text: text, done: false };
    todos.push(row);
    if (!saveTodos(todos)) {
      todos.pop();
      reportSaveFailure();
      return;
    }
    clearStatus();
    input.value = "";
    render();
    input.focus();
  });

  render();
  input.focus();
})();
  </script>
</body>
</html>
